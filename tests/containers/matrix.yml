#
# Multi-distro test matrix for terok-shield — declarative input to the
# shared engine in terok-util.  Run with `uv run terok-matrix` from
# the repo root (or `make test-matrix`).
#
# Shield needs only the podman + nft egress stack (no dbus, no ssh) — the
# shared nested-podman image family fits as-is (incl. the AppArmor
# slirp4netns workaround on alpine/void).  The fragments/ overlay carries
# the one genuinely shield-specific quirk: the podman slot's userns=host
# drop-in for the nft-in-netns pre-check.

image-prefix: terok-shield-test
flavor: podman
expect: [podman, nft, dnsmasq, dig, getent, internet]
groups: [test]

slots:
  debian12:
  ubuntu2404:
  ubuntu2604:
  debian13:
  fedora43:
  fedora44:
  podman:
    extra-packages: [slirp4netns]
  alpine:
  void:
  mageia:

phases:
  - name: installing shield hooks
    run:
      - terok-shield setup
    expect-add: [hooks]
  - name: check-environment
    run:
      - terok-shield check-environment 2>&1
    tolerate-failure: true
  - name: unit tests
    scope: unit
    pytest: tests/unit/ -v --tb=short --durations=25
  - name: integration tests (all markers)
    scope: integ
    pytest: tests/integration/ -v --tb=short --durations=25 --durations-min=1.0
